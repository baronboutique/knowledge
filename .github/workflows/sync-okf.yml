name: Sync OKF bundle from baronboutique.com

# Pulls the live OKF bundle AND llms.txt / llms-full.txt from the WordPress
# plugin's token-authenticated manifest endpoint and commits any changes.
# Runs server-side on GitHub's runner, so it is NOT affected by robots.txt and
# needs no credentials beyond the OKF manifest token (stored as a repo secret).
#
# v3 (2026-07-02) — REQUIRES PLUGIN v1.9.8+. The llms.txt / llms-full.txt
# front-end fetch step is GONE: the host firewall blocks GitHub's runners on
# front-end routes (this emptied both files in the repo from 2026-06-18 to
# 2026-07-02), while the REST manifest route works. Plugin v1.9.8 ships both
# llms files inside the manifest, so everything now syncs through the one
# channel that works. The writer only accepts paths under okf/ or the two
# llms files, so a compromised manifest cannot write elsewhere.
#
# SETUP (one time):
#   1) Install plugin v1.9.8 in WordPress and regenerate llms + OKF once.
#   2) In the repo:  Settings -> Secrets and variables -> Actions
#        -> secret OKF_MANIFEST_TOKEN = the token from
#           Baron Boutique AI -> OKF Generator (value after token= only).
#   3) Replace .github/workflows/sync-okf.yml with this file (branch main).
#   4) Run it:  Actions tab -> "Sync OKF bundle from baronboutique.com"
#        -> Run workflow.  After this it also runs automatically every Sunday.

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 9 * * 0'   # every Sunday 09:00 UTC

permissions:
  contents: write

concurrency:
  group: okf-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Rebuild okf/ + llms files from the live manifest
        env:
          OKF_TOKEN: ${{ secrets.OKF_MANIFEST_TOKEN }}
          SITE: https://baronboutique.com
        run: |
          set -euo pipefail
          if [ -z "${OKF_TOKEN}" ]; then
            echo "::error::OKF_MANIFEST_TOKEN secret is not set."; exit 1
          fi
          curl -sf --retry 3 --retry-delay 5 \
            "${SITE}/wp-json/bbaikm/v1/okf-manifest?token=${OKF_TOKEN}" -o manifest.json
          test -s manifest.json
          # Rebuild okf/ from scratch so additions, updates AND deletions all
          # sync. llms files are only replaced when the manifest carries them
          # (plugin v1.9.8+), never blanked.
          rm -rf okf
          python3 - <<'PY'
          import json, base64, os
          m = json.load(open('manifest.json'))
          files = m.get('files', [])
          if not files:
              raise SystemExit('Manifest contained no files - aborting.')
          ALLOWED_ROOT = ('llms.txt', 'llms-full.txt')
          count = llms = 0
          for f in files:
              path = f.get('path', '')
              content = f.get('content')
              if not path or content is None:
                  continue
              if '..' in path or path.startswith('/'):
                  continue
              if not (path.startswith('okf/') or path in ALLOWED_ROOT):
                  continue
              data = base64.b64decode(content)
              if path in ALLOWED_ROOT:
                  if not data.strip():
                      print('::warning::%s arrived empty in the manifest - keeping the existing repo copy.' % path)
                      continue
                  llms += 1
              os.makedirs(os.path.dirname(path) or '.', exist_ok=True)
              with open(path, 'wb') as fh:
                  fh.write(data)
              count += 1
          print('wrote %d files (%d llms)' % (count, llms))
          if llms == 0:
              print('::warning::Manifest carried no llms files - plugin older than v1.9.8, or public output disabled, or llms not generated yet. Existing repo copies kept.')
          PY
          rm -f manifest.json

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config user.name  "okf-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync OKF bundle + llms files from baronboutique.com ($(date -u +%Y-%m-%d))"
            git push
          fi
